<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="score-board">

      <div class="text-wrapper">
        HOME
      </div>

      <div class="div">
        AWAY
      </div>

      <div class="score ">
        <div class="text-wrapper-2 js-home-score">0</div>
      </div>

      <div class="div-wrapper">
        <div class="text-wrapper-2 js-score-away">0</div>
      </div>

      <div class="score-button">
        <button class="btn">
          <div class="text-wrapper-3 js-home-btn-1">+1</div>
        </button>

        <button class="btn">
          <div class="text-wrapper-3 js-home-btn-2">+2</div>
        </button>

        <button class="btn">
          <div class="text-wrapper-3 js-home-btn-3">+3</div>
        </button>
      </div>

      <div class="score-button-2">
        <button class="btn js-btn-one">
          <div class="text-wrapper-3">+1</div>
        </button>

        <button class="btn">
          <div class="text-wrapper-3 js-btn-two">+2</div>
        </button>

        <button class="btn">
          <div class="text-wrapper-3 js-btn-three">+3</div>
        </button>
      </div>

      <div class="new-game-btn">
        <div class="text-wrapper-4 js-new-game">New Game</div>
      </div>

    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
